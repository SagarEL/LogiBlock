{% extends 'base.html' %}
{% block content %}
<div class="flex h-screen overflow-hidden">
    <aside class="w-64 bg-stone-900 border-r border-orange-900/30 h-full flex flex-col">
        <div class="p-6 bg-stone-800 border-b border-orange-900/50">
            <h2 class="text-2xl font-bold text-orange-400">Warehouse Staff</h2>
            <p class="text-xs text-stone-400">Verification Terminal</p>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-2">
            <a href="{{ url_for('warehouse.dashboard') }}" class="block px-4 py-3 rounded text-stone-300 hover:bg-stone-800 hover:text-orange-400 transition"><i class="fas fa-boxes w-6"></i> Incoming Parcels</a>
        </nav>
        <div class="p-4 bg-stone-800">
            <a href="{{ url_for('auth.logout') }}" class="block px-4 py-2 text-center rounded bg-orange-600 hover:bg-orange-700 text-white font-bold"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>
    <main class="flex-1 h-full overflow-y-auto bg-stone-950 p-8">
        {% block warehouse_content %}{% endblock %}
    </main>
</div>
{% endblock %}
