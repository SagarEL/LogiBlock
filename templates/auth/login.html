{% extends 'base.html' %}

{% block content %}
<div class="flex items-center justify-center min-h-screen p-4">
    <div class="glass rounded-xl p-8 max-w-md w-full shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">LogiBlock</h1>
            <p class="text-gray-400 mt-2">Secure Route Verification Logistics</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300">Username</label>
                <input type="text" name="username" required class="mt-1 block w-full rounded-md bg-slate-800 border-gray-600 text-white focus:border-blue-500 focus:ring-blue-500 p-2.5">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300">Password</label>
                <input type="password" name="password" required class="mt-1 block w-full rounded-md bg-slate-800 border-gray-600 text-white focus:border-blue-500 focus:ring-blue-500 p-2.5">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-300">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
