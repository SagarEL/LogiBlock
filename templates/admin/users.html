{% extends 'base/admin_base.html' %}

{% block admin_content %}
<div class="mb-8 flex justify-between items-center">
    <div>
        <h1 class="text-3xl font-bold">System Users</h1>
        <p class="text-gray-400">Manage access control across the network</p>
    </div>
    <button onclick="document.getElementById('addModal').classList.remove('hidden')" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg font-semibold">
        <i class="fas fa-plus"></i> Add User
    </button>
</div>

<div class="glass rounded-xl overflow-hidden">
    <table class="w-full text-left border-collapse">
        <thead>
            <tr class="bg-slate-800/50 border-b border-slate-700">
                <th class="p-4 text-sm font-semibold text-gray-300">ID</th>
                <th class="p-4 text-sm font-semibold text-gray-300">Username</th>
                <th class="p-4 text-sm font-semibold text-gray-300">Role</th>
            </tr>
        </thead>
        <tbody>
            {% for u in users %}
            <tr class="border-b border-slate-700/50 hover:bg-slate-800/30 transition">
                <td class="p-4 font-mono text-sm text-gray-400">{{ u.id }}</td>
                <td class="p-4 text-sm font-semibold">{{ u.username }}</td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded text-xs font-semibold
                        {% if u.role == 'Admin' %} bg-purple-900/50 text-purple-400
                        {% elif u.role == 'Warehouse' %} bg-emerald-900/50 text-emerald-400
                        {% elif u.role == 'Delivery' %} bg-blue-900/50 text-blue-400
                        {% else %} bg-gray-700/50 text-gray-300 {% endif %}">
                        {{ u.role }}
                    </span>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Add Modal -->
<div id="addModal" class="hidden fixed inset-0 bg-black/80 flex justify-center items-center z-50">
    <div class="glass p-8 rounded-xl max-w-md w-full">
        <h2 class="text-2xl font-bold mb-6">Add New User</h2>
        <form method="POST" class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400">Username</label>
                <input type="text" name="username" required class="w-full bg-slate-800 rounded p-2 text-white border border-slate-600">
            </div>
            <div>
                <label class="block text-sm text-gray-400">Password</label>
                <input type="password" name="password" required class="w-full bg-slate-800 rounded p-2 text-white border border-slate-600">
            </div>
            <div>
                <label class="block text-sm text-gray-400">Role</label>
                <select name="role" required class="w-full bg-slate-800 rounded p-2 text-white border border-slate-600">
                    <option value="Warehouse">Warehouse Staff</option>
                    <option value="Delivery">Delivery Agent</option>
                    <option value="Client">User/Client</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div class="flex justify-end space-x-4 mt-6">
                <button type="button" onclick="document.getElementById('addModal').classList.add('hidden')" class="px-4 py-2 bg-slate-700 rounded-lg">Cancel</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 rounded-lg">Save User</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
