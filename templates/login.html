{% extends 'base.html' %}

{% block auth_content %}
<div class="w-full max-w-md p-8 glass-card rounded-2xl animate-fade-in">
    <div class="text-center mb-8">
        <i class="fa-solid fa-cube text-cyan-400 text-4xl mb-4"></i>
        <h2 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-fuchsia-500 to-indigo-500">LogiBlock</h2>
        <p class="text-slate-400 mt-2">Blockchain Logistics Management</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Username</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-user text-slate-500"></i>
                </div>
                <input type="text" name="username" required class="w-full pl-10 pr-4 py-3 bg-zinc-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-slate-500 outline-none transition-all" placeholder="Enter username">
            </div>
        </div>
        
        <div>
            <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <i class="fa-solid fa-lock text-slate-500"></i>
                </div>
                <input type="password" name="password" required class="w-full pl-10 pr-4 py-3 bg-zinc-900/50 border border-slate-700 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-slate-500 outline-none transition-all" placeholder="Enter password">
            </div>
        </div>

        <button type="submit" class="w-full py-3 px-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium rounded-xl shadow-lg shadow-blue-500/25 transform transition-all hover:-translate-y-0.5 outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 focus:ring-offset-slate-900">
            Sign In
        </button>
    </form>
    
    <div class="mt-6 text-center text-sm text-slate-400">
        <p>Default credentials:</p>
        <p class="mt-1"><span class="font-mono bg-zinc-800 px-2 py-1 rounded">admin</span> / <span class="font-mono bg-zinc-800 px-2 py-1 rounded">admin123</span></p>
    </div>
</div>
{% endblock %}
